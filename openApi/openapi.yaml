          type: string
          readOnly: true
          description: User who created the record
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          description: Last update timestamp
        updatedBy:
          type: string
          readOnly: true
          description: User who last updated the record

    OrganizationDTO:
