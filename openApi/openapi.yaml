                        $ref: '#/components/schemas/TeamDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Teams
      summary: Update team
      description: Update an existing team
      operationId: updateTeam
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Team ID
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamDTO'
      responses:
        '200':
          description: Team updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TeamDTO'
        '304':
          description: No changes detected
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Teams
      summary: Delete team
      description: Delete a team by ID
      operationId: deleteTeam
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Team ID
          example: 1
      responses:
        '200':
          description: Team deleted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: 'null'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /teams/{id}/exists:
    get:
      tags:
        - Teams
      summary: Check if team exists
      description: Check if a team exists by ID
      operationId: teamExists
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Team ID
          example: 1
      responses:
        '200':
          description: Existence check completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: boolean
        '500':
          $ref: '#/components/responses/InternalServerError'

  /teams/displayName/{displayName}:
    get:
      tags:
        - Teams
      summary: Get team by display name
      description: Retrieve a team by its display name
      operationId: getTeamByDisplayName
      parameters:
        - name: displayName
          in: path
          required: true
          schema:
            type: string
          description: Team display name
          example: América
      responses:
        '200':
          description: Team retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TeamDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /teams/teamsByNameGenderAndCategory:
    get:
      tags:
        - Teams
      summary: Get team by display name, gender, and age category
      description: Retrieve a team by its display name, gender, and age category
      operationId: getTeamByDisplayNameGenderAgeCategory
      parameters:
        - name: displayName
          in: query
          required: true
          schema:
            type: string
          description: Team display name
          example: América
        - name: gender
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Gender'
          description: Team gender
          example: MALE
        - name: ageCategory
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/AgeCategory'
          description: Age category
          example: PROFESSIONAL
      responses:
        '200':
          description: Team retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TeamDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /teams/teamsByGender/{gender}:
    get:
      tags:
        - Teams
      summary: Get teams by gender
      description: Retrieve paginated teams filtered by gender
      operationId: getTeamsByGender
      parameters:
        - name: gender
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/Gender'
          description: Team gender
          example: MALE
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: sortField
          in: query
          schema:
            type: string
            default: name
          description: Field to sort by
        - name: sortDirection
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort direction
      responses:
        '200':
          description: Teams retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PageTeamDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
