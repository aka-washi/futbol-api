      summary: Get team by display name, gender, and age category
      description: Retrieve a team by its display name, gender, and age category
      operationId: getTeamByDisplayNameGenderAgeCategory
      parameters:
        - name: displayName
          in: query
          required: true
          schema:
            type: string
          description: Team display name
        - name: gender
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Gender'
          description: Team gender
        - name: ageCategory
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/AgeCategory'
          description: Age category
      responses:
        '200':
          description: Team retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
