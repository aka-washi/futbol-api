      description: Sort direction
      required: false
      schema:
        type: string
        enum: [asc, desc]
        default: asc

  schemas:
    # Base Response Models
    ApiResponse:
      type: object
      required:
        - success
        - message
        - timestamp
      properties:
        success:
          type: boolean
          description: Indicates if the operation was successful
        message:
          type: string
          description: Human-readable message about the operation
        data:
          description: The response data (type varies by endpoint)
        error:
          $ref: '#/components/schemas/ApiError'
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the response
          example: '2026-01-18T10:30:00'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    ApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code
          example: NOT_FOUND
        message:
          type: string
          description: Error message
          example: Resource not found

    PaginationInfo:
      type: object
      required:
        - page
        - size
        - totalElements
        - totalPages
        - first
        - last
        - hasNext
        - hasPrevious
      properties:
        page:
          type: integer
          description: Current page number (0-indexed)
          example: 0
        size:
          type: integer
          description: Number of items per page
          example: 20
        totalElements:
          type: integer
          format: int64
          description: Total number of elements
          example: 100
        totalPages:
          type: integer
          description: Total number of pages
          example: 5
        first:
          type: boolean
          description: Whether this is the first page
          example: true
        last:
          type: boolean
          description: Whether this is the last page
          example: false
        hasNext:
          type: boolean
          description: Whether there is a next page
          example: true
        hasPrevious:
          type: boolean
          description: Whether there is a previous page
          example: false

