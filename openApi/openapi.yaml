        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Organizations
      summary: Create a new organization
      description: Create a new organization entry
      operationId: createOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationDTO'
      responses:
        '201':
          description: Organization created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrganizationDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /organizations/{id}:
    get:
      tags:
        - Organizations
      summary: Get organization by ID
      description: Retrieve a specific organization by its ID
      operationId: getOrganizationById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Organization ID
          example: 1
      responses:
        '200':
          description: Organization retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrganizationDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Organizations
      summary: Update organization
      description: Update an existing organization
      operationId: updateOrganization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Organization ID
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationDTO'
      responses:
        '200':
          description: Organization updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrganizationDTO'
        '304':
          description: No changes detected
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Organizations
      summary: Delete organization
      description: Delete an organization by ID
      operationId: deleteOrganization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Organization ID
          example: 1
      responses:
        '200':
          description: Organization deleted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: 'null'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /organizations/{id}/exists:
    get:
      tags:
        - Organizations
      summary: Check if organization exists
      description: Check if an organization exists by ID
      operationId: organizationExists
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Organization ID
          example: 1
      responses:
        '200':
          description: Existence check completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: boolean
        '500':
          $ref: '#/components/responses/InternalServerError'

  /organizations/name/{name}:
    get:
      tags:
        - Organizations
      summary: Get organization by name
      description: Retrieve an organization by its name
      operationId: getOrganizationByName
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Organization name
          example: Club de Fútbol América S.A. de C.V.
      responses:
        '200':
          description: Organization retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrganizationDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /organizations/displayName/{displayName}:
    get:
      tags:
        - Organizations
      summary: Get organization by display name
      description: Retrieve an organization by its display name
      operationId: getOrganizationByDisplayName
      parameters:
        - name: displayName
          in: path
          required: true
          schema:
            type: string
          description: Organization display name
          example: América
      responses:
        '200':
          description: Organization retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrganizationDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /organizations/abbreviation/{abbreviation}:
    get:
      tags:
        - Organizations
      summary: Get organization by abbreviation
      description: Retrieve an organization by its abbreviation
      operationId: getOrganizationByAbbreviation
      parameters:
        - name: abbreviation
          in: path
          required: true
          schema:
            type: string
            maxLength: 20
          description: Organization abbreviation
          example: AME
      responses:
        '200':
          description: Organization retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrganizationDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /organizations/type/{type}:
    get:
      tags:
        - Organizations
      summary: Get organizations by type
      description: Retrieve paginated organizations filtered by type
      operationId: getOrganizationsByType
      parameters:
        - name: type
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OrganizationType'
          description: Organization type
          example: CLUB
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: sortField
          in: query
          schema:
            type: string
            default: name
          description: Field to sort by
        - name: sortDirection
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort direction
      responses:
        '200':
          description: Organizations retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PageOrganizationDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Teams Endpoints
  /teams:
