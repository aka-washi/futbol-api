      tags:
        - Teams
      summary: Get team by ID
      description: Retrieve a specific team by its ID
      operationId: getTeamById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Team ID
      responses:
