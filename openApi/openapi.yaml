components:
  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (0-indexed)
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    
    SizeParam:
      name: size
      in: query
      description: Number of items per page
      required: false
      schema:
        type: integer
        minimum: 1
        default: 20
    
    SortByParam:
      name: sortBy
      in: query
      description: Field to sort by
      required: false
      schema:
        type: string
        default: name
    
    SortDirParam:
      name: sortDir
      in: query
      description: Sort direction
      required: false
      schema:
        type: string
        enum: [asc, desc]
        default: asc

  schemas:
    # Base Response Models
    ApiResponse:
      type: object
      required:
        - success
        - message
        - timestamp
      properties:
        success:
          type: boolean
          description: Indicates if the operation was successful
        message:
          type: string
          description: Human-readable message about the operation
        data:
          description: The response data (type varies by endpoint)
        error:
          $ref: '#/components/schemas/ApiError'
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the response
          example: '2026-01-18T10:30:00'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    ApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code
          example: NOT_FOUND
        message:
          type: string
          description: Error message
          example: Resource not found

    PaginationInfo:
      type: object
      required:
        - page
        - size
        - totalElements
        - totalPages
        - first
        - last
        - hasNext
        - hasPrevious
      properties:
        page:
          type: integer
          description: Current page number (0-indexed)
          example: 0
        size:
          type: integer
          description: Number of items per page
          example: 20
        totalElements:
          type: integer
          format: int64
          description: Total number of elements
          example: 100
        totalPages:
          type: integer
          description: Total number of pages
          example: 5
        first:
          type: boolean
          description: Whether this is the first page
          example: true
        last:
          type: boolean
          description: Whether this is the last page
          example: false
        hasNext:
          type: boolean
          description: Whether there is a next page
          example: true
        hasPrevious:
          type: boolean
          description: Whether there is a previous page
          example: false

    # Enums
    Gender:
      type: string
      description: Gender classification for teams and persons
      enum:
        - MALE
        - FEMALE
      x-enum-descriptions:
        - "Male teams or persons"
        - "Female teams or persons"

    AgeCategory:
      type: string
      description: Age category classification for teams
      enum:
        - PROFESSIONAL
        - RESERVE
        - AMATEUR
        - U23
        - U21
        - U20
        - U19
        - U18
        - U17
        - U16
        - U15
        - U14
        - U13
        - U12
        - U11
        - U10
        - U9
        - U8
        - U7
        - U6
        - VETERANS
      x-enum-descriptions:
        - "Top-level professional teams"
        - "Reserve/B teams"
        - "Amateur level teams"
        - "Under 23 years old"
        - "Under 21 years old"
        - "Under 20 years old"
        - "Under 19 years old"
        - "Under 18 years old"
        - "Under 17 years old"
        - "Under 16 years old"
        - "Under 15 years old"
        - "Under 14 years old"
        - "Under 13 years old"
        - "Under 12 years old"
        - "Under 11 years old"
        - "Under 10 years old"
        - "Under 9 years old"
        - "Under 8 years old"
        - "Under 7 years old"
        - "Under 6 years old"
        - "Veteran/masters teams (35+)"

    OrganizationType:
      type: string
      description: Type of football organization
      enum:
        - CLUB
        - FEDERATION
        - CONFEDERATION
        - GOVERNINGBODY
      x-enum-descriptions:
        - "Football club (e.g., Real Madrid, Manchester United)"
        - "National football federation (e.g., FMF, USSF)"
        - "Continental confederation (e.g., UEFA, CONMEBOL)"
        - "Global governing body (e.g., FIFA)"

    StructureType:
      type: string
      description: Type of competition structure
      enum:
        - REGULAR_SEASON
        - PLAYOFF
        - PLAY_IN
        - KNOCKOUT
        - GROUP_STAGE
        - ROUND_ROBIN
      x-enum-descriptions:
        - "Regular season with home and away matches"
        - "Playoff bracket after regular season"
        - "Play-in tournament to qualify for playoffs"
        - "Single or two-leg knockout elimination"
        - "Group stage with multiple groups"
        - "Round-robin format where all teams play each other"

    # Point System DTO
    PointSystemDTO:
      type: object
      required:
        - name
        - displayName
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          description: Point System ID
        name:
          type: string
          minLength: 2
          maxLength: 100
          description: Point system name
          example: Standard 3-1-0
        displayName:
          type: string
          minLength: 2
          maxLength: 100
          description: Display name
          example: Standard Points
        description:
          type: string
          maxLength: 500
          description: Description of the point system
          example: Standard football point system with 3 points for a win
        pointsForWin:
          type: integer
          description: Points awarded for a win
          example: 3
        pointsForDraw:
          type: integer
          description: Points awarded for a draw
          example: 1
        pointsForLoss:
          type: integer
          description: Points awarded for a loss
          example: 0
        pointsForWinOnPenalties:
          type: integer
          description: Points awarded for a win on penalties (knockout stages)
          example: 2
        pointsForLossOnPenalties:
          type: integer
          description: Points awarded for a loss on penalties (knockout stages)
          example: 1
        active:
          type: boolean
          description: Whether the point system is currently active
          default: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
          description: Creation timestamp
        createdBy:
          type: string
          readOnly: true
          description: User who created the record
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          description: Last update timestamp
        updatedBy:
          type: string
          readOnly: true
          description: User who last updated the record

    # Structure DTO
    StructureDTO:
      type: object
      required:
        - name
        - displayName
        - type
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          description: Structure ID
        name:
          type: string
          minLength: 2
          maxLength: 100
          description: Structure name
          example: Liga MX Apertura Regular Season
        displayName:
          type: string
          minLength: 2
          maxLength: 100
          description: Display name
          example: Apertura Regular Season
        type:
          $ref: '#/components/schemas/StructureType'
        description:
          type: string
          maxLength: 500
          description: Description of the structure
          example: Regular season format with home and away matches
        rules:
          type: string
          description: Rules specific to this structure
        pointSystemId:
          type: integer
          format: int64
          description: Associated point system ID
          nullable: true
        pointSystemDisplayName:
          type: string
          readOnly: true
          description: Point system display name
        numberOfTeams:
          type: integer
          description: Number of teams in this structure
          example: 18
        numberOfGroups:
          type: integer
          description: Number of groups (for group stage structures)
          example: 1
        teamsPerGroup:
          type: integer
          description: Number of teams per group
          example: 18
        hasHomeAndAway:
          type: boolean
          description: Whether teams play home and away matches
          default: true
        teamsQualifyingForNextStage:
          type: integer
          description: Number of teams qualifying for the next stage
          example: 12
        createdAt:
          type: string
          format: date-time
          readOnly: true
          description: Creation timestamp
        createdBy:
          type: string
          readOnly: true
          description: User who created the record
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          description: Last update timestamp
        updatedBy:
          type: string
          readOnly: true
          description: User who last updated the record

    # DTOs
    CountryDTO:
      type: object
      required:
        - name
        - displayName
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          description: Country ID
        name:
          type: string
          minLength: 2
          maxLength: 100
          description: Country name
          example: United Mexican States
        code:
          type: string
          maxLength: 2
          description: Country code (2 characters)
