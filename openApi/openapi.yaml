components:
  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (0-indexed)
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    
    SizeParam:
      name: size
      in: query
      description: Number of items per page
      required: false
      schema:
        type: integer
        minimum: 1
        default: 20
    
    SortByParam:
      name: sortBy
      in: query
      description: Field to sort by
      required: false
      schema:
        type: string
        default: name
    
    SortDirParam:
      name: sortDir
      in: query
      description: Sort direction
      required: false
      schema:
        type: string
        enum: [asc, desc]
        default: asc

  schemas:
    # Base Response Models
    ApiResponse:
      type: object
      required:
        - success
        - message
        - timestamp
      properties:
        success:
          type: boolean
          description: Indicates if the operation was successful
        message:
          type: string
          description: Human-readable message about the operation
        data:
          description: The response data (type varies by endpoint)
        error:
          $ref: '#/components/schemas/ApiError'
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the response
          example: '2026-01-17T10:30:00'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    ApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code
          example: NOT_FOUND
        message:
          type: string
          description: Error message
          example: Resource not found

    PaginationInfo:
      type: object
      required:
        - page
        - size
        - totalElements
        - totalPages
        - first
        - last
        - hasNext
        - hasPrevious
      properties:
        page:
          type: integer
          description: Current page number (0-indexed)
          example: 0
        size:
          type: integer
          description: Number of items per page
          example: 20
        totalElements:
          type: integer
          format: int64
          description: Total number of elements
          example: 100
        totalPages:
          type: integer
          description: Total number of pages
          example: 5
        first:
          type: boolean
          description: Whether this is the first page
          example: true
        last:
          type: boolean
          description: Whether this is the last page
          example: false
        hasNext:
          type: boolean
          description: Whether there is a next page
          example: true
        hasPrevious:
          type: boolean
          description: Whether there is a previous page
          example: false

    # Enums
    Gender:
      type: string
      enum:
        - MALE
        - FEMALE
      description: Gender classification

    AgeCategory:
      type: string
      enum:
        - PROFESSIONAL
        - RESERVE
        - AMATEUR
        - U23
        - U21
        - U20
        - U19
        - U18
        - U17
        - U16
        - U15
        - U14
        - U13
        - U12
        - U11
        - U10
        - U9
        - U8
        - U7
        - U6
        - VETERANS
      description: Age category classification for teams

    OrganizationType:
      type: string
      enum:
        - CLUB
        - FEDERATION
        - CONFEDERATION
        - GOVERNINGBODY
      description: Type of football organization

    # DTOs
    CountryDTO:
      type: object
      required:
        - name
        - displayName
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          description: Country ID
        name:
          type: string
          minLength: 2
          maxLength: 100
          description: Country name
          example: Spain
        code:
          type: string
          maxLength: 2
          description: Country code (2 characters)
          example: ES
        isoCode:
          type: string
          maxLength: 3
          description: ISO code (3 characters)
          example: ESP
        displayName:
          type: string
          minLength: 2
          maxLength: 100
          description: Display name
          example: Spain
        flagUrl:
          type: string
          maxLength: 500
          description: URL to the country flag image
          example: https://example.com/flags/spain.png
        createdAt:
          type: string
          format: date-time
          readOnly: true
          description: Creation timestamp
        createdBy:
          type: string
          readOnly: true
          description: User who created the record
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          description: Last update timestamp
        updatedBy:
          type: string
          readOnly: true
          description: User who last updated the record

    OrganizationDTO:
      type: object
      required:
        - name
        - displayName
        - founded
        - type
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          description: Organization ID
        name:
          type: string
          minLength: 2
          maxLength: 150
          description: Organization name
          example: Real Madrid CF
        displayName:
          type: string
          minLength: 2
          maxLength: 150
          description: Display name
          example: Real Madrid
        abbreviation:
          type: string
          maxLength: 20
          description: Organization abbreviation
          example: RMA
        founded:
          type: string
          format: date
          description: Foundation date
          example: '1902-03-06'
        parentOrganizationId:
          type: integer
          format: int64
          description: Parent organization ID (if applicable)
          nullable: true
        parentOrganizationDisplayName:
          type: string
          readOnly: true
          description: Parent organization display name
        countryId:
          type: integer
          format: int64
          description: Country ID where organization is based
          nullable: true
        countryDisplayName:
          type: string
          readOnly: true
          description: Country display name
        headquarters:
          type: string
          maxLength: 200
          description: Headquarters location
          example: Madrid, Spain
        logo:
          type: string
          maxLength: 500
          description: URL to organization logo
          example: https://example.com/logos/real-madrid.png
        website:
          type: string
          maxLength: 500
          description: Official website URL
          example: https://www.realmadrid.com
        description:
          type: string
          description: Organization description
        type:
          $ref: '#/components/schemas/OrganizationType'
        createdAt:
          type: string
          format: date-time
          readOnly: true
          description: Creation timestamp
        createdBy:
          type: string
          readOnly: true
          description: User who created the record
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          description: Last update timestamp
        updatedBy:
          type: string
          readOnly: true
          description: User who last updated the record

    TeamDTO:
      type: object
      required:
        - name
        - displayName
        - code
        - gender
        - ageCategory
        - founded
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          description: Team ID
        name:
          type: string
          minLength: 2
          maxLength: 100
          description: Team name
          example: FC Barcelona
        displayName:
          type: string
          minLength: 2
          maxLength: 100
          description: Display name
          example: Barcelona
        code:
          type: string
          minLength: 3
          maxLength: 5
          description: Team code
          example: BAR
        gender:
          $ref: '#/components/schemas/Gender'
        ageCategory:
          $ref: '#/components/schemas/AgeCategory'
        founded:
          type: string
          format: date
          description: Foundation date
          example: '1899-11-29'
        organizationId:
          type: integer
          format: int64
          description: Organization ID that owns the team
          nullable: true
        organizationDisplayName:
          type: string
          readOnly: true
          description: Organization display name
        countryId:
          type: integer
          format: int64
          description: Country ID where team is based
          nullable: true
        countryDisplayName:
          type: string
          readOnly: true
          description: Country display name
        venueId:
          type: integer
          format: int64
          description: Home venue ID
          nullable: true
        venueDisplayName:
          type: string
          readOnly: true
          description: Venue display name
        logo:
          type: string
          description: URL to team logo
          example: https://example.com/logos/barcelona.png
        primaryColor:
          type: string
          maxLength: 7
          description: Primary color (hex format)
          example: '#A50044'
        secondaryColor:
          type: string
          maxLength: 7
          description: Secondary color (hex format)
          example: '#004D98'
        website:
          type: string
          description: Official website URL
          example: https://www.fcbarcelona.com
        active:
          type: boolean
          description: Whether the team is currently active
          default: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
          description: Creation timestamp
        createdBy:
          type: string
          readOnly: true
          description: User who created the record
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          description: Last update timestamp
        updatedBy:
          type: string
          readOnly: true
          description: User who last updated the record

    VenueDTO:
      type: object
      required:
        - name
        - displayName
        - city
        - capacity
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          description: Venue ID
        name:
          type: string
          minLength: 2
          maxLength: 100
          description: Venue name
          example: Camp Nou
        displayName:
          type: string
          minLength: 2
          maxLength: 100
          description: Display name
          example: Camp Nou
        city:
          type: string
          minLength: 2
          maxLength: 100
          description: City where venue is located
          example: Barcelona
        countryId:
          type: integer
          format: int64
          description: Country ID where venue is located
          nullable: true
        countryDisplayName:
          type: string
          readOnly: true
          description: Country display name
        capacity:
          type: integer
          description: Venue capacity (number of seats)
          example: 99354
        address:
          type: string
          description: Full address
          example: C. d'Arístides Maillol, 12, 08028 Barcelona, Spain
        image:
          type: string
          description: URL to venue image
          example: https://example.com/venues/camp-nou.jpg
        opened:
          type: string
          format: date
          description: Date when venue was opened
          example: '1957-09-24'
        surface:
          type: string
          maxLength: 100
          description: Playing surface type
          example: Natural grass
        active:
          type: boolean
          description: Whether the venue is currently active
          default: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
          description: Creation timestamp
        createdBy:
          type: string
          readOnly: true
          description: User who created the record
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          description: Last update timestamp
        updatedBy:
          type: string
          readOnly: true
          description: User who last updated the record

    # Paginated Response Models
    PageCountryDTO:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/CountryDTO'
        pageable:
          type: object
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        last:
          type: boolean
        size:
          type: integer
        number:
          type: integer
        first:
          type: boolean
        numberOfElements:
          type: integer
        empty:
          type: boolean

    PageOrganizationDTO:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationDTO'
        pageable:
          type: object
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        last:
          type: boolean
        size:
          type: integer
        number:
          type: integer
        first:
          type: boolean
        numberOfElements:
          type: integer
        empty:
          type: boolean

    PageTeamDTO:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/TeamDTO'
        pageable:
          type: object
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        last:
          type: boolean
        size:
          type: integer
        number:
          type: integer
        first:
          type: boolean
        numberOfElements:
          type: integer
        empty:
          type: boolean

    PageVenueDTO:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/VenueDTO'
        pageable:
          type: object
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        last:
          type: boolean
        size:
          type: integer
        number:
          type: integer
        first:
          type: boolean
        numberOfElements:
          type: integer
        empty:
          type: boolean

  responses:
    BadRequest:
      description: Bad request - Invalid parameters
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiResponse'
              - type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    $ref: '#/components/schemas/ApiError'
          example:
            success: false
            message: Validation failed
            error:
              code: INVALID_PARAMETER
              message: Invalid parameter value
            timestamp: '2026-01-17T10:30:00'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiResponse'
              - type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    $ref: '#/components/schemas/ApiError'
          example:
            success: false
            message: Resource not found
            error:
              code: NOT_FOUND
              message: Resource with specified identifier not found
            timestamp: '2026-01-17T10:30:00'

    Conflict:
      description: Conflict - Resource already exists
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiResponse'
              - type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    $ref: '#/components/schemas/ApiError'
          example:
            success: false
            message: Resource already exists
            error:
              code: DUPLICATE_ERROR
              message: A resource with the same identifier already exists
            timestamp: '2026-01-17T10:30:00'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiResponse'
              - type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    $ref: '#/components/schemas/ApiError'
          example:
            success: false
            message: An internal server error occurred
            error:
              code: SERVER_ERROR
              message: An unexpected error occurred while processing the request
            timestamp: '2026-01-17T10:30:00'
