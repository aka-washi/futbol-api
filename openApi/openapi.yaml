  responses:
    BadRequest:
      description: Bad request - Invalid parameters
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiResponse'
              - type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    $ref: '#/components/schemas/ApiError'
          example:
            success: false
            message: Validation failed
            error:
              code: INVALID_PARAMETER
              message: Invalid parameter value
            timestamp: '2026-01-18T10:30:00'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiResponse'
              - type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    $ref: '#/components/schemas/ApiError'
          example:
            success: false
            message: Resource not found
            error:
              code: NOT_FOUND
              message: Resource with specified identifier not found
            timestamp: '2026-01-18T10:30:00'

    Conflict:
      description: Conflict - Resource already exists
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiResponse'
              - type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    $ref: '#/components/schemas/ApiError'
          example:
            success: false
            message: Resource already exists
            error:
              code: DUPLICATE_ERROR
              message: A resource with the same identifier already exists
            timestamp: '2026-01-18T10:30:00'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiResponse'
              - type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    $ref: '#/components/schemas/ApiError'
          example:
            success: false
            message: An internal server error occurred
            error:
              code: SERVER_ERROR
              message: An unexpected error occurred while processing the request
            timestamp: '2026-01-18T10:30:00'
