              message: A resource with the same identifier already exists
            timestamp: '2026-01-18T10:30:00'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiResponse'
              - type: object
                properties:
