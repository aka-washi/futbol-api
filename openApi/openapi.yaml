        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /teams/teamsByGenderAgeCategoryAndOrganizationId:
    get:
      tags:
        - Teams
      summary: Get teams by gender, age category, and organization
      description: Retrieve paginated teams filtered by gender, age category, and organization ID
      operationId: getTeamsByGenderAgeCategoryAndOrganizationId
      parameters:
        - name: gender
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Gender'
          description: Team gender
        - name: ageCategory
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/AgeCategory'
          description: Age category
        - name: organizationId
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: Organization ID
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: sortField
          in: query
          schema:
            type: string
            default: name
          description: Field to sort by
        - name: sortDirection
          in: query
