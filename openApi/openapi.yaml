openapi: '3.1.0'
info:
  version: '1.0.0'
  title: Futbol API
  description: |
    A comprehensive REST API for managing football (soccer) data including teams, countries, organizations, venues, and more.
    
    This API provides endpoints for managing football-related entities with full CRUD operations, advanced filtering, and pagination support.
  contact:
    name: Eagle Team
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server
  - url: https://api.example.com/api/v1
    description: Production server

tags:
  - name: Countries
    description: Operations related to countries
  - name: Organizations
    description: Operations related to football organizations (clubs, federations, confederations)
  - name: Teams
    description: Operations related to football teams
  - name: Venues
    description: Operations related to stadiums and venues
  - name: Point Systems
    description: Operations related to point systems for league standings
  - name: Structures
    description: Operations related to competition structures (leagues, tournaments, playoffs)

paths:
  # Countries Endpoints
  /countries:
    get:
      tags:
        - Countries
      summary: Get all countries
      description: Retrieve a paginated list of all countries
      operationId: getAllCountries
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortDirParam'
      responses:
        '200':
          description: Countries retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PageCountryDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Countries
      summary: Create a new country
      description: Create a new country entry
      operationId: createCountry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CountryDTO'
      responses:
        '201':
          description: Country created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CountryDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /countries/{id}:
    get:
      tags:
        - Countries
      summary: Get country by ID
      description: Retrieve a specific country by its ID
      operationId: getCountryById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Country ID
          example: 1
      responses:
        '200':
          description: Country retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CountryDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Countries
      summary: Update country
      description: Update an existing country
      operationId: updateCountry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Country ID
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CountryDTO'
      responses:
        '200':
          description: Country updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CountryDTO'
        '304':
          description: No changes detected
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Countries
      summary: Delete country
      description: Delete a country by ID
      operationId: deleteCountry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Country ID
          example: 1
      responses:
        '200':
          description: Country deleted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: 'null'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /countries/{id}/exists:
    get:
      tags:
        - Countries
      summary: Check if country exists
      description: Check if a country exists by ID
      operationId: countryExists
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Country ID
          example: 1
      responses:
        '200':
          description: Existence check completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: boolean
        '500':
          $ref: '#/components/responses/InternalServerError'

  /countries/name/{name}:
    get:
      tags:
        - Countries
      summary: Get country by name
      description: Retrieve a country by its name
      operationId: getCountryByName
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Country name
          example: United Mexican States
      responses:
        '200':
          description: Country retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CountryDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /countries/displayName/{displayName}:
    get:
      tags:
        - Countries
      summary: Get country by display name
      description: Retrieve a country by its display name
      operationId: getCountryByDisplayName
      parameters:
        - name: displayName
          in: path
          required: true
          schema:
            type: string
          description: Country display name
          example: Mexico
      responses:
        '200':
          description: Country retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CountryDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /countries/code/{code}:
    get:
      tags:
        - Countries
      summary: Get country by code
      description: Retrieve a country by its 2-letter code
      operationId: getCountryByCode
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
            maxLength: 2
          description: Country code (2 characters)
          example: MX
      responses:
        '200':
          description: Country retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CountryDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /countries/iso/{isoCode}:
    get:
      tags:
        - Countries
      summary: Get country by ISO code
      description: Retrieve a country by its ISO code
      operationId: getCountryByIsoCode
      parameters:
        - name: isoCode
          in: path
          required: true
          schema:
            type: string
            maxLength: 3
          description: Country ISO code (3 characters)
          example: MEX
      responses:
        '200':
          description: Country retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CountryDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Organizations Endpoints
  /organizations:
    get:
      tags:
        - Organizations
      summary: Get all organizations
      description: Retrieve a paginated list of all organizations
      operationId: getAllOrganizations
      parameters:
