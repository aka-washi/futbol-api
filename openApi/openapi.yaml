            message: Resource not found
            error:
              code: NOT_FOUND
              message: Resource with specified identifier not found
            timestamp: '2026-01-18T10:30:00'

    Conflict:
      description: Conflict - Resource already exists
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiResponse'
              - type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
