      summary: Delete team
      description: Delete a team by ID
      operationId: deleteTeam
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Team ID
      responses:
        '200':
          description: Team deleted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: 'null'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /teams/{id}/exists:
    get:
      tags:
        - Teams
      summary: Check if team exists
      description: Check if a team exists by ID
      operationId: teamExists
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Team ID
      responses:
        '200':
          description: Existence check completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: boolean
        '500':
          $ref: '#/components/responses/InternalServerError'

  /teams/displayName/{displayName}:
    get:
      tags:
        - Teams
      summary: Get team by display name
      description: Retrieve a team by its display name
      operationId: getTeamByDisplayName
      parameters:
        - name: displayName
          in: path
