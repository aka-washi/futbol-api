spring:
  profiles:
    active: h2

  application:
    name: futbol-api

  jpa:
    show-sql: false
    properties:
      hibernate:
        '[format_sql]': true

  web:
    error:
      include-message: always
      include-binding-errors: always

server:
  port: 8080
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:4200
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed-headers:
    - "*"
  exposed-headers: []
  allow-credentials: true
  max-age: 3600